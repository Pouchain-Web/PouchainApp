<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger PouchainApp</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --subtext: #8E8E93;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 30px;
            padding: 40px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
        }

        p {
            color: var(--subtext);
            font-size: 15px;
            margin: 0 0 32px 0;
            line-height: 1.4;
        }

        .version-badge {
            display: inline-block;
            background: rgba(0, 122, 255, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn.disabled {
            background: var(--subtext);
            opacity: 0.5;
            pointer-events: none;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--subtext);
        }

        .loader {
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-pouchain.svg" alt="Pouchain" class="logo">
        <h1>Installation Mobile</h1>
        <p>Téléchargez la dernière version de l'application Pouchain pour Android.</p>

        <div id="loading">
            <div class="loader"></div>
            <span style="color: var(--subtext);">Vérification de la version...</span>
        </div>

        <div id="content" class="hidden">
            <div class="version-badge" id="version-display">Version v...</div>
            <a href="#" id="download-btn" class="btn">Télécharger l'APK</a>
            <div class="footer" id="file-info">Taille: -- Mo • Date: --</div>
        </div>

        <div id="error" class="hidden" style="color: #FF3B30; font-size: 14px;">
            Erreur lors de la récupération de l'application.
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';
        import config from './js/config.js';

        async function init() {
            // 1. Theme
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (isDark) document.documentElement.setAttribute('data-theme', 'dark');

            try {
                // 2. Check Auth
                const session = await auth.getSession();
                if (!session) {
                    window.location.href = 'index.html?redirect=download.html';
                    return;
                }

                // 3. Fetch latest APK
                const res = await fetch(`${config.api.workerUrl}/update/apk-check?t=${Date.now()}`);
                if (!res.ok) throw new Error("Fichier non trouvé");
                
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                
                document.getElementById('version-display').innerText = `Dernière version : v${data.version}`;
                document.getElementById('download-btn').href = data.url;
                
                const sizeMb = (data.size / (1024 * 1024)).toFixed(1);
                const dateStr = new Date(data.uploaded).toLocaleDateString('fr-FR');
                document.getElementById('file-info').innerText = `Taille : ${sizeMb} Mo • Publié le : ${dateStr}`;

            } catch (err) {
                console.error(err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error').innerText = "Aucune application disponible au téléchargement pour le moment.";
            }
        }

        init();
    </script>
</body>
</html>
